name: Validate static prototype

on:
  push:
    branches:
      - main
      - aitarot-ai-generator
  pull_request:
    branches:
      - main
      - aitarot-ai-generator

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run build
